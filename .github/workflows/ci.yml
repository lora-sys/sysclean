name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y whiptail jq

      - name: Lint bash scripts
        run: |
          for f in sysclean lib/*.sh tests/*.sh install.sh uninstall.sh; do
            bash -n "$f" && echo "  ✓ $f" || (echo "  ✗ $f FAILED"; exit 1)
          done

      - name: Run UI unit tests
        run: bash tests/test_ui.sh

      - name: Run CLI tests
        run: |
          set +e
          echo "--- Test: --version ---"
          ./sysclean --version
          echo "rc=$?"
          echo ""
          echo "--- Test: --help ---"
          ./sysclean --help > /dev/null
          echo "rc=$?"
          echo ""
          echo "--- Test: --scan ---"
          ./sysclean --scan > /tmp/scan_output.txt
          SCAN_RC=$?
          echo "rc=$SCAN_RC"
          if [ $SCAN_RC -ne 0 ]; then
            echo "--- last 30 lines of stderr ---"
            ./sysclean --scan 2>&1 >/dev/null | tail -30
            echo "--- end ---"
          fi
          echo ""
          echo "--- Test: grep ---"
          grep -q "───" /tmp/scan_output.txt
          echo "rc=$?"
          exit 0  # don't fail the step on this, we have other checks

      - name: Run E2E tests
        run: |
          sudo apt-get install -y python3
          bash tests/test_e2e.sh

  # (AUR removed - now distributing via personal pacman repo)
